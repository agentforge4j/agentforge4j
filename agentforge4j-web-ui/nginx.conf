# nginx config for the agentforge4j.org preview container (self-hosted, interim only —
# GitHub Pages is the actual launch host per the site design; this exists purely so the
# site can be previewed before that launch).
#
# Serves the static SPA build. No /api proxy — this site has no backend.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Direct-navigation 404s get the site's own branded not-found page (mirrors the
    # GitHub Pages 404.html mechanism — see scripts/copy-404.mjs).
    error_page 404 /404.html;
}
