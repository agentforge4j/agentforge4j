<!doctype html>
<html lang="en">
  <head>
    <!-- theme-bootstrap:start
         Sets `data-theme` on <html> before the SPA's own bundle loads, so the correct palette is
         already painted on the first frame — never a light-then-dark (or reverse) flash while
         React mounts. Must run before any stylesheet paints content, so it is the very first
         thing in <head>, and is deliberately a hand-written copy of theme.ts's
         resolveEffectiveTheme/currentThemeMode logic rather than an import: nothing here can
         import a bundled module, since this script IS what runs before any bundle exists. Kept in
         sync with theme.ts by tests/themeBootstrapScript.test.ts, which extracts this exact
         script and asserts it resolves identically to theme.ts for every representative input —
         change one, update the other, and let that test catch drift. The storage key literal
         below MUST match THEME_STORAGE_KEY in src/theme/theme.ts exactly. -->
    <script>
      (function () {
        var KEY = 'agentforge4j.theme';
        var mode = 'system';
        try {
          var stored = window.localStorage.getItem(KEY);
          if (stored === 'light' || stored === 'dark' || stored === 'system') {
            mode = stored;
          }
        } catch (e) {
          /* localStorage unavailable/throwing — fall back to 'system', same as theme.ts. */
        }
        var dark = mode === 'dark';
        if (mode === 'system') {
          try {
            dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          } catch (e) {
            /* matchMedia unavailable — fall back to light, same as theme.ts's default false. */
          }
        }
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <!-- theme-bootstrap:end -->
