name: UI E2E

# Browser-level gate for the JavaScript UI packages. Installs the workflow-builder and the
# agentforge4j-ui-e2e module, runs the builder unit tests (typecheck + vitest), then drives the
# builder dev harness with Playwright (Chromium, headless). Separate from the Maven `CI` workflow
# (this never touches Java) and from CodeQL/Gitleaks.
#
# This workflow ALWAYS triggers on pushes/PRs to `main` (no `on: paths:` filter) and the `builder`
# job ALWAYS runs, so the `builder` check is always reported and can safely be a required status
# check. A cheap `changes` job detects whether any JS/UI path changed:
#   - if change-detection itself does not succeed, `builder` FAILS FAST (fail-closed — never a
#     silent pass when we could not determine what changed);
#   - if no JS/UI path changed, `builder` skips only the expensive install/Playwright steps and
#     succeeds, so Java/Maven-only PRs are gated-but-not-blocked;
#   - if a JS/UI path changed, the full builder unit + Playwright suite runs and gates the PR.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Distinct group from the Maven `CI` workflow (`ci-<ref>`) so the two never cancel each other.
concurrency:
  group: ui-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      ui: ${{ steps.filter.outputs.ui }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect UI/JS changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          else
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          fi
          # Guard against a missing or all-zero base (e.g. a branch's first push).
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse "$head^" 2>/dev/null || echo "$head")"
          fi
          echo "Comparing $base...$head"
          # Three-dot: only the changes this ref introduces relative to the merge base.
          changed="$(git diff --name-only "$base...$head" 2>/dev/null || git diff --name-only "$base" "$head")"
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -qE '^(agentforge4j-workflow-builder/|agentforge4j-ui-e2e/|\.github/workflows/ui-e2e\.yml)'; then
            echo "ui=true" >> "$GITHUB_OUTPUT"
          else
            echo "ui=false" >> "$GITHUB_OUTPUT"
          fi

  builder:
    name: builder
    needs: changes
    # Always run so the required `builder` check is always reported — never "skipped"/"missing".
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      # Fail-closed: if we could not determine what changed, do not let the gate pass silently.
      - name: Fail if change detection did not succeed
        if: ${{ needs.changes.result != 'success' }}
        run: |
          echo "::error::change-detection job concluded '${{ needs.changes.result }}'; failing the UI E2E gate (fail-closed)."
          exit 1

      # Everything below runs only when a JS/UI path changed; otherwise these steps are skipped and
      # the job still succeeds, so non-UI PRs are not blocked.
      - name: Checkout
        if: ${{ needs.changes.outputs.ui == 'true' }}
        uses: actions/checkout@v6

      - name: Set up Node
        if: ${{ needs.changes.outputs.ui == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            agentforge4j-workflow-builder/package-lock.json
            agentforge4j-ui-e2e/package-lock.json

      - name: Install workflow-builder
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm ci

      - name: Install ui-e2e
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm ci

      - name: Builder typecheck
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm run typecheck

      - name: Builder unit tests (vitest)
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm run test

      - name: Cache Playwright browsers
        if: ${{ needs.changes.outputs.ui == 'true' }}
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('agentforge4j-ui-e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npx playwright install --with-deps chromium

      - name: Run builder e2e
        if: ${{ needs.changes.outputs.ui == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm run test:e2e:builder

      - name: Upload Playwright report
        if: ${{ failure() && needs.changes.outputs.ui == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            agentforge4j-ui-e2e/playwright-report/**
            agentforge4j-ui-e2e/test-results/**
          if-no-files-found: ignore
          retention-days: 7
