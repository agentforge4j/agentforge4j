name: UI E2E

# Browser-level gate for the JavaScript UI packages. Installs the workflow-builder and the
# agentforge4j-ui-e2e module, runs the builder unit tests (typecheck + vitest), then drives the
# builder dev harness with Playwright (Chromium, headless). Also builds and drives the
# agentforge4j.org public site (agentforge4j-web-ui) with its own Playwright project. Separate
# from the Maven `CI` workflow (this never touches Java) and from CodeQL/Gitleaks.
#
# This workflow ALWAYS triggers on pushes/PRs to `main` (no `on: paths:` filter) and both the
# `builder` and `web-ui-e2e` jobs ALWAYS run, so both checks are always reported and can safely be
# required status checks. A cheap `changes` job detects, independently, whether a builder-relevant
# or a web-ui-relevant path changed:
#   - if change-detection itself does not succeed, BOTH jobs FAIL FAST (fail-closed — never a
#     silent pass when we could not determine what changed);
#   - if the relevant path didn't change, that job skips only its expensive install/Playwright
#     steps and succeeds, so unrelated PRs (Java-only, or builder-only, or web-ui-only) are
#     gated-but-not-blocked on the parts they didn't touch;
#   - if the relevant path did change, the full unit + Playwright suite runs and gates the PR.
# `agentforge4j-ui-e2e/` itself and this workflow file are common triggers for both jobs, since a
# change there can affect either target's test harness. `agentforge4j-workflows-catalog/` is also
# a web-ui-relevant trigger: the site build reads shipped-workflow content straight from that
# module's source resources, so a catalogue-only change can change what the site renders.
# Both jobs also typecheck agentforge4j-ui-e2e's own Playwright specs/support code before running
# them, same as each side's own app/package typecheck.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Distinct group from the Maven `CI` workflow (`ci-<ref>`) so the two never cancel each other.
concurrency:
  group: ui-e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      builder: ${{ steps.filter.outputs.builder }}
      webUi: ${{ steps.filter.outputs.webUi }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect UI/JS changes
        id: filter
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base='${{ github.event.pull_request.base.sha }}'
            head='${{ github.event.pull_request.head.sha }}'
          else
            base='${{ github.event.before }}'
            head='${{ github.sha }}'
          fi
          # Guard against a missing or all-zero base (e.g. a branch's first push).
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-parse "$head^" 2>/dev/null || echo "$head")"
          fi
          echo "Comparing $base...$head"
          # Three-dot: only the changes this ref introduces relative to the merge base.
          changed="$(git diff --name-only "$base...$head" 2>/dev/null || git diff --name-only "$base" "$head")"
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -qE '^(agentforge4j-workflow-builder/|agentforge4j-ui-e2e/|\.github/workflows/ui-e2e\.yml)'; then
            echo "builder=true" >> "$GITHUB_OUTPUT"
          else
            echo "builder=false" >> "$GITHUB_OUTPUT"
          fi
          # agentforge4j-workflows-catalog/ included: the site build reads shipped-workflow
          # content directly from that module's source resources (build-catalogue-data.mjs), so a
          # catalogue-only change can change what the site actually renders without touching
          # agentforge4j-web-ui/ itself.
          if echo "$changed" | grep -qE '^(agentforge4j-web-ui/|agentforge4j-workflows-catalog/|agentforge4j-ui-e2e/|\.github/workflows/ui-e2e\.yml)'; then
            echo "webUi=true" >> "$GITHUB_OUTPUT"
          else
            echo "webUi=false" >> "$GITHUB_OUTPUT"
          fi

  builder:
    name: builder
    needs: changes
    # Always run so the required `builder` check is always reported — never "skipped"/"missing".
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      # Fail-closed: if we could not determine what changed, do not let the gate pass silently.
      - name: Fail if change detection did not succeed
        if: ${{ needs.changes.result != 'success' }}
        run: |
          echo "::error::change-detection job concluded '${{ needs.changes.result }}'; failing the UI E2E gate (fail-closed)."
          exit 1

      # Everything below runs only when a builder-relevant path changed; otherwise these steps are
      # skipped and the job still succeeds, so unrelated PRs are not blocked.
      - name: Checkout
        if: ${{ needs.changes.outputs.builder == 'true' }}
        uses: actions/checkout@v7

      - name: Set up Node
        if: ${{ needs.changes.outputs.builder == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            agentforge4j-workflow-builder/package-lock.json
            agentforge4j-ui-e2e/package-lock.json

      - name: Install workflow-builder
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm ci

      - name: Install ui-e2e
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm ci

      - name: ui-e2e typecheck
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm run typecheck

      - name: Builder typecheck
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm run typecheck

      - name: Builder unit tests (vitest)
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-workflow-builder
        run: npm run test

      - name: Cache Playwright browsers
        if: ${{ needs.changes.outputs.builder == 'true' }}
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('agentforge4j-ui-e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npx playwright install --with-deps chromium

      - name: Run builder e2e
        if: ${{ needs.changes.outputs.builder == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm run test:e2e:builder

      - name: Upload Playwright report
        if: ${{ failure() && needs.changes.outputs.builder == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-builder
          path: |
            agentforge4j-ui-e2e/playwright-report/**
            agentforge4j-ui-e2e/test-results/**
          if-no-files-found: ignore
          retention-days: 7

  web-ui-e2e:
    name: web-ui-e2e
    needs: changes
    # Always run so the required `web-ui-e2e` check is always reported — never "skipped"/"missing".
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      # Fail-closed: if we could not determine what changed, do not let the gate pass silently.
      - name: Fail if change detection did not succeed
        if: ${{ needs.changes.result != 'success' }}
        run: |
          echo "::error::change-detection job concluded '${{ needs.changes.result }}'; failing the UI E2E gate (fail-closed)."
          exit 1

      # Everything below runs only when a web-ui-relevant path changed; otherwise these steps are
      # skipped and the job still succeeds, so unrelated PRs are not blocked.
      - name: Checkout
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        uses: actions/checkout@v7

      - name: Set up Node
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: |
            agentforge4j-web-ui/package-lock.json
            agentforge4j-ui-e2e/package-lock.json

      - name: Install web-ui
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        working-directory: agentforge4j-web-ui
        run: npm ci

      - name: Install ui-e2e
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm ci

      - name: ui-e2e typecheck
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm run typecheck

      - name: Cache Playwright browsers
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('agentforge4j-ui-e2e/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npx playwright install --with-deps chromium

      # The `web-ui` project's own webServer builds the site (npm run build) then serves it
      # (npm run preview) — a real production-style build, not the dev server.
      - name: Run web-ui e2e
        if: ${{ needs.changes.outputs.webUi == 'true' }}
        working-directory: agentforge4j-ui-e2e
        run: npm run test:e2e:web-ui

      - name: Upload Playwright report
        if: ${{ failure() && needs.changes.outputs.webUi == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-web-ui
          path: |
            agentforge4j-ui-e2e/playwright-report/**
            agentforge4j-ui-e2e/test-results/**
          if-no-files-found: ignore
          retention-days: 7
