name: Docs

# Build + quality gate for the OSS documentation site (agentforge4j-docs). Unlike the Node-only UI
# E2E workflow, the docs build has Java inputs: the reference pages are generated by reflecting over
# the installed OSS artifacts (the docs emitter) and the Spring configuration metadata, the code
# snippets are gated by the examples build, and the API surface is the aggregate Javadoc. So this
# workflow installs the OSS reactor (JDK 17), runs the emitter + examples + Javadoc, then the Node
# generate/lint/typecheck/test/build and the accessibility gate.
#
# This job ALWAYS runs the full pipeline on every push/PR to `main` — it does NOT gate on a changed-
# paths filter. The generated reference (via the emitter's reflection over the *installed* artifacts)
# and the aggregate Javadoc surface depend on essentially the whole OSS reactor: any public class,
# config property, provider, event, status, or behaviour in any module can change what the docs gate
# must validate. A path allowlist narrow enough to be accurate would have to enumerate (and keep in
# sync forever) every framework module, which is exactly the kind of list that silently goes stale as
# modules are added — so under-triggering is the greater risk, and this workflow always runs instead.

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs:
    name: docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install the OSS reactor
        # Installs every OSS artifact (and the starter's Spring configuration metadata) to the local
        # repository so the emitter, the examples, and the aggregate Javadoc can resolve them. Tests
        # are skipped here — the docs gate builds the site, not the framework's test suite.
        run: ./mvnw -B -e -q -DskipTests -Dmaven.test.skip=true install

      - name: Generate the docs emitter output
        # The standalone emitter reflects over the installed artifacts and writes providers/contract-set/
        # bootstrap JSON that the reference generators consume.
        run: >-
          ./mvnw -B -q -f agentforge4j-docs-emitter/pom.xml exec:java
          -Dexec.args="${{ github.workspace }}/agentforge4j-docs/scripts/emitter-output"

      - name: Build the examples (snippet compile gate)
        # The examples reactor is the compile/run gate for every source-backed snippet the docs include.
        run: ./mvnw -B -q -f agentforge4j-examples/pom.xml -Dmaven.test.skip=true install

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version-file: '.nvmrc'
          cache: npm
          cache-dependency-path: agentforge4j-docs/package-lock.json

      - name: Install docs dependencies
        working-directory: agentforge4j-docs
        run: npm ci

      - name: Build the Javadoc surface
        working-directory: agentforge4j-docs
        run: npm run javadoc

      - name: Generate, lint, type-check, test, and build the site
        working-directory: agentforge4j-docs
        run: npm run check

      - name: Accessibility gate (pa11y-ci, WCAG 2.1 AA)
        working-directory: agentforge4j-docs
        run: npm run a11y

      - name: Upload the built site
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: docs-site
          path: agentforge4j-docs/build/**
          if-no-files-found: ignore
          retention-days: 7
