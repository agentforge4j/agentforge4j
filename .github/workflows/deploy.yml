name: Deploy Docs

# Publishes the documentation site to GitHub Pages. Builds the full site with the same shared
# .github/actions/build-docs-site composite action the Docs gate uses (one pipeline definition, no
# drift), then composes a single Pages artifact (/docs + /javadoc/{next,latest}, archived versions
# carried forward) and deploys it. Never runs on pull requests (previews are the build artifact
# uploaded by the Docs workflow).
#
# MANUAL DISPATCH ONLY — deliberately fail-closed. GitHub Pages serves one site per custom domain,
# and how this repository's /docs and /javadoc surfaces compose with the project website under
# `agentforge4j.org` is not settled yet. Until it is, nothing may publish automatically: a deploy
# happens only when a maintainer dispatches this workflow, and the artifact carries no CNAME unless
# the repository variable DOCS_CUSTOM_DOMAIN is set (mapped below into the assemble step; see
# scripts/assemble-site.mjs — an unset/empty variable resolves to no CNAME, the same as today). When
# automatic publishing is enabled later, prefer an unfiltered `push: main` trigger — the generated
# reference and the Javadoc surface depend on essentially the whole reactor, so any path filter
# would let the published site go silently stale.

on:
  workflow_dispatch:

# Allow one concurrent deployment; do not cancel an in-progress deploy (Pages best practice).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build the documentation site
        uses: ./.github/actions/build-docs-site
        with:
          # The Docs gate is the emitter's test stage; the deploy only needs the compiled classes.
          emitter-maven-phases: compile

      - name: Assemble the Pages artifact (/docs + /javadoc)
        working-directory: agentforge4j-docs
        env:
          # Repository (or org) Actions variable — unset/empty means no custom domain (default,
          # since the domain composition with the project website is not settled yet).
          DOCS_CUSTOM_DOMAIN: ${{ vars.DOCS_CUSTOM_DOMAIN }}
        run: node scripts/assemble-site.mjs

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: agentforge4j-docs/_site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
