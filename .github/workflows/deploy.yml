name: Deploy Docs

# Publishes the documentation site to GitHub Pages. Builds the full site with the same shared
# .github/actions/build-docs-site composite action the Docs gate uses (one pipeline definition, no
# drift), then composes a single Pages artifact (/docs + /javadoc/{next,latest}, archived versions
# carried forward) and deploys it. Runs on EVERY push to `main` and on manual dispatch; never on pull
# requests (previews are the build artifact uploaded by the Docs workflow).
#
# No changed-paths filter: the generated reference and the aggregate Javadoc surface depend on
# essentially the whole OSS reactor (any module's public API, config property, or provider can change
# what gets published), so a narrower filter would let framework-only changes ship to `main` without
# ever redeploying the docs/Javadoc that describe them — the published site would silently go stale.
# Always rebuilding on push to `main` is the only way to guarantee Pages reflects the current source.
#
# NOTE (owner infra decision): this deploys THIS repository's surfaces (/docs, /javadoc) with the
# `agentforge4j.org` CNAME. GitHub Pages allows one site per custom domain, so if the separate org
# website owns the apex, the domain ownership / path composition across the two repositories is an
# infrastructure decision to settle before enabling this workflow's custom domain.

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow one concurrent deployment; do not cancel an in-progress deploy (Pages best practice).
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build the documentation site
        uses: ./.github/actions/build-docs-site

      - name: Assemble the Pages artifact (/docs + /javadoc)
        working-directory: agentforge4j-docs
        run: node scripts/assemble-site.mjs

      - name: Upload the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: agentforge4j-docs/_site

  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
