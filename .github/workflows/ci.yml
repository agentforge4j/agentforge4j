name: CI

# Build + test gate for the OSS framework. Runs the full Maven `verify` (compile, Surefire
# unit tests, Failsafe integration/loopback tests, and the gating SpotBugs/Checkstyle checks)
# via the Maven Wrapper (`./mvnw`, pinned Maven version) on an OS × JDK matrix. Distinct from
# the release/publish, CodeQL, and Gitleaks workflows.
#
# The compiler `release` stays 17 (parent pom); the matrix also runs on 21 to prove no Java
# 21+ API has crept into the JDK-17 main sources. JDK 26 is intentionally excluded — it
# crashes the SpotBugs-class tooling pinned for the OSS build. One windows-latest × JDK 21 leg
# exercises real Windows path/symlink handling (a Windows-only failure is a genuine finding).

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

# Cancel superseded runs on the same ref so only the latest commit's CI keeps running.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Uniform shell across every leg so a single `./mvnw` invocation works on Linux and on the
# windows-latest runner (which provides Git Bash for `shell: bash`).
defaults:
  run:
    shell: bash

jobs:
  build:
    name: build (${{ matrix.os }}, JDK ${{ matrix.java }})
    runs-on: ${{ matrix.os }}
    # Job-level so the SonarQube step's `if:` can read env.SONAR_TOKEN (step-level env is not in
    # scope for that step's own `if`, and secrets.* cannot be referenced in `if` directly). Absent
    # on fork PRs, which is why the step guards on it being non-empty.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    strategy:
      # Run every leg to completion even if one fails, so a 17-only, 21-only, or Windows-only
      # break is visible in the same run.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java: ["17", "21"]
        # Windows runs a single JDK-21 leg (path/symlink coverage); ubuntu covers both JDKs.
        exclude:
          - os: windows-latest
            java: "17"
    steps:
      - name: Checkout
        # Full history (no shallow clone) so SonarQube can attribute new code and blame accurately.
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Build and verify
        # verify runs Surefire (*Test), Failsafe (*IT), the gating SpotBugs + Checkstyle checks,
        # and the JaCoCo report. OWASP Dependency-Check has no verify-bound execution, so it does
        # not run here.
        run: ./mvnw -B -ntp verify

      - name: SonarQube Cloud analysis
        # JDK-17 leg only: sonar-maven-plugin 5.x requires Java 17+, and a single analysis run must
        # own the project key (running on both legs would conflict). Guarded on the secret so fork
        # PRs (no SONAR_TOKEN) skip cleanly instead of hard-failing. Reuses the compiled classes and
        # JaCoCo report from the verify step above rather than re-running the build. The scanner
        # reads SONAR_TOKEN from the environment automatically; -Dsonar.qualitygate.wait=true fails
        # this step (and thus the JDK-17 build leg, which the quality-gate job aggregates) when the
        # Quality Gate fails.
        if: ${{ matrix.os == 'ubuntu-latest' && matrix.java == '17' && env.SONAR_TOKEN != '' }}
        run: ./mvnw -B -ntp sonar:sonar -Dsonar.qualitygate.wait=true

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          # Unique per matrix leg (os + jdk): upload-artifact v4 errors on duplicate names, and
          # ubuntu/windows both run a JDK-21 leg.
          name: test-reports-${{ matrix.os }}-jdk-${{ matrix.java }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**
          if-no-files-found: ignore
          retention-days: 7

  quality-gate:
    # Single stable required-check name for branch protection. A matrix otherwise produces
    # per-leg contexts (build (JDK 17) / build (JDK 21)) that are brittle to require directly.
    name: quality-gate
    needs: [build]
    # Always run so this check posts a definitive success/failure (never "skipped", which some
    # branch-protection configurations treat as passing). The step below is what fails it.
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all build legs to succeed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: |
          echo "One or more build legs did not succeed: ${{ join(needs.*.result, ', ') }}"
          exit 1
