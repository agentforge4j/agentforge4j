name: Gitleaks

# Secret scanning. Runs the gitleaks CLI directly (MIT-licensed, free) rather than the
# gitleaks-action wrapper, which requires a paid GITLEAKS_LICENSE for organization-owned repos.
# Scans the full git history on every push/PR to main and on a weekly schedule. Rules and
# allowlist come from .gitleaks.toml.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # Weekly, Monday 06:37 UTC.
    - cron: "37 6 * * 1"

permissions:
  contents: read

env:
  # Pinned gitleaks CLI version. Bump manually when desired (Dependabot does not track this URL).
  GITLEAKS_VERSION: "8.30.1"

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so every commit is scanned, not just the latest.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan git history
        # gitleaks exits non-zero when it finds leaks, failing the job. --redact keeps any
        # matched secret out of the logs.
        run: gitleaks git . --config=.gitleaks.toml --redact --verbose
