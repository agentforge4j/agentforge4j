name: Bug report
description: Report a defect in AgentForge4j
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** report security
        vulnerabilities here — see [SECURITY.md](https://github.com/agentforge4j/agentforge4j/blob/main/SECURITY.md) for private reporting.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the behaviour?
      placeholder: |
        1. Configure '...'
        2. Run '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include stack traces or logs if available.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Relevant versions and platform.
      value: |
        - AgentForge4j version / commit:
        - Java version:
        - OS:
        - LLM provider(s):
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might help.
    validations:
      required: false
