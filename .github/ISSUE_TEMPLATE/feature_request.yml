name: Feature request
description: Suggest an idea or enhancement for AgentForge4j
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For anything substantial, this issue is a good place
        to agree the approach before any code is written.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve? What's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've considered, and why they fall short.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that would help us understand the request.
    validations:
      required: false
