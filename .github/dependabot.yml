# Dependabot configuration for AgentForge4j (OSS).
# Keeps Maven dependencies, GitHub Actions, and the two npm front-end modules current.
# Minor/patch updates are grouped to reduce PR noise; majors get their own PRs for review.
version: 2

updates:
  # Maven dependencies for the whole multi-module reactor (root + all modules).
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    # Major bumps are intentionally left ungrouped so each lands in its own reviewable PR.
    ignore:
      # Pin to the 2.0.x (Jackson-2) line, converged with the MCP SDK's transitive 2.0.0:
      # block the Jackson-3 3.x line while still allowing 2.0.x patches. Dependabot blocks the
      # proposal; the platform-side convergence guard test blocks the resolution.
      - dependency-name: "com.networknt:json-schema-validator"
        versions: [">=3.0.0"]
      # Spring Boot 4.x: the platform repo consumes the OSS starter on Boot 3.x; upgrade is coordinated, not automatic.
      - dependency-name: "org.springframework.boot:*"
        update-types: ["version-update:semver-major"]
      # json-schema-validator stays on the 2.0.x line (Jackson 2); 3.x requires Jackson 3 —
      # any major bump must be a coordinated migration, never an automatic PR.
      - dependency-name: "com.networknt:json-schema-validator"
        update-types: ["version-update:semver-major"]

  # GitHub Actions used by the CI/security/release workflows (pinned action versions).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # npm front-end module: agentforge4j-web-ui (committed package-lock.json).
  - package-ecosystem: "npm"
    directory: "/agentforge4j-web-ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      web-ui-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # react-router-dom 7 is a real migration (new package layout + data APIs); deferred until planned.
      - dependency-name: "react-router-dom"
        update-types: ["version-update:semver-major"]

  # npm front-end module: agentforge4j-workflow-builder (committed package-lock.json).
  - package-ecosystem: "npm"
    directory: "/agentforge4j-workflow-builder"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      workflow-builder-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
