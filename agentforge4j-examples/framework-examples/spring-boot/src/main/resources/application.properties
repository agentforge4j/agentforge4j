# Enable the deterministic fake LLM provider; this example overrides its response source with a
# run-agnostic StaticFakeResponseSource bean (see SpringBootExampleApplication).
agentforge4j.llm.fake.enabled=true

# Load only this example's own workflow/agent config, not the framework's shipped defaults.
agentforge4j.load-shipped-workflows=false
agentforge4j.load-shipped-agents=false

# Keep example output focused.
spring.main.banner-mode=off
logging.level.root=WARN
