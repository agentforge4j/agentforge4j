# LLM provider configuration for this example.
#
# Out of the box this file selects the deterministic, offline fake LLM: the api-key is blank, so no real
# provider and no network are used. Copy this module as-is and it runs with no key and no extra dependency.
#
# To run against a real model instead, set agentforge4j.example.llm.api-key below (or the
# AGENTFORGE4J_EXAMPLE_LLM_API_KEY environment variable) AND add a provider module dependency
# (for example agentforge4j-llm-openai) to this module's pom.xml. No code change is required.
#
# Precedence for every value, highest first: JVM system property, environment variable, then this file.

agentforge4j.example.llm.provider=openai
agentforge4j.example.llm.api-key=

# Optional explicit fake/real toggle. When unset, the fake is used if and only if no api-key is configured.
# Overridable at runtime with -Dagentforge4j.example.fake-llm=... or AGENTFORGE4J_EXAMPLE_FAKE_LLM=...
# agentforge4j.example.fake-llm=true
